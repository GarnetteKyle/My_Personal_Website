<!DOCTYPE html>

<head>

    <title>Sample Contact Form </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</head>

<body class="bg-light">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


    <div class="container mt-4">
        <h2 class="text-info mb-5">Contact Form</h2>

        <form>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Full Name:</label>

                    <input type="text" class="form-control form-control-lg" placeholder="Enter full name"
                        aria-label="Full Name">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email Address:</label>

                    <input type="email" class="form-control form-control-sm" placeholder="Enter email address"
                        aria-label="emailContact">
                    <div id="emailContact" class="form-text">
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label">Message:</label>
                <textarea class="form-control" rows="5" aria-label="Message"></textarea>
            </div>

            <div class="mt-4">
                <label class="form-label d-block">Preferred Contact Method:</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="email">
                    <label class="form-check-label" for="email">Email</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="phone">
                    <label class="form-check-label" for="phone">Phone</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="whatsapp">
                    <label class="form-check-label" for="whatsapp">WhatsApp</label>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label">Favorite Color:</label>

                <input type="color" class="form-control form-control-color" aria-label="Favorite Color">
            </div>

            <div class="mt-4">
                <label class="form-label">User ID:</label>
                <input type="text" class="form-control bg-info" value="20240101239" disabled>
            </div>

            <div class="mt-4">
                <label class="form-label">Account Type:</label>
                
                <input type="text" class="form-control-plaintext" value="Student" readonly>
            </div>

            <button type="submit" class="btn btn-success">
                Submit
            </button>

        </form>
    </div>




</body>

</html>
